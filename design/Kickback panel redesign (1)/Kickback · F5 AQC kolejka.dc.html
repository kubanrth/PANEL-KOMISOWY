<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#050807;-webkit-font-smoothing:antialiased}
@keyframes kb-in{from{transform:translateY(8px)}to{transform:none}}
</style>
</helmet>
<div data-screen-label="F5 · A&QC kolejka" style="display:flex;align-items:stretch;min-height:100vh;background:#050807;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">

  <dc-import name="KickbackSidebar" variant="admin" mode="default" active-id="aqc" expanded="aqc" hint-size="260px,1500px" style="flex-shrink:0"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column">
    <header style="position:sticky;top:0;z-index:30;height:64px;flex-shrink:0;display:flex;align-items:center;gap:16px;padding:0 24px;background:rgba(5,8,7,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07)">
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span style="font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">Admin</span><span style="color:#4A4E4B">/</span><span style="font:500 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">A&amp;QC</span><span style="font:600 9px 'IBM Plex Mono',monospace;letter-spacing:0.12em;color:#FF5A47;background:rgba(255,90,71,0.1);border:1px solid rgba(255,90,71,0.25);padding:2px 6px;border-radius:999px;text-transform:uppercase;margin-left:4px">Admin</span></div>
      <div style="flex:1;display:flex;justify-content:center"><div style="width:100%;max-width:400px;height:40px;min-width:0;display:flex;align-items:center;gap:10px;background:#16191A;border-radius:999px;padding:0 16px;border:1px solid rgba(255,255,255,0.06)"><i class="ph ph-magnifying-glass" style="font-size:17px;color:#7B7F7B;flex-shrink:0"></i><span style="flex:1;min-width:0;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#4A4E4B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Szukaj koszulki, klubu, klienta…</span><span style="flex-shrink:0;font:500 10px 'IBM Plex Mono',monospace;color:#4A4E4B;border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:2px 6px">⌘K</span></div></div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <button style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:#16191A;color:#BDBFBD;cursor:pointer" style-hover="background:#1D2120"><i class="ph ph-bell" style="font-size:19px"></i><span style="position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:9px;background:#FF5A47;border:1.5px solid #16191A"></span></button>
        <button style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:#16191A;color:#BDBFBD;cursor:pointer" style-hover="background:#1D2120"><i class="ph ph-moon-stars" style="font-size:19px"></i></button>
        <button style="display:flex;align-items:center;gap:8px;height:40px;padding:0 8px;border:1px solid rgba(255,255,255,0.08);border-radius:999px;background:#16191A;cursor:pointer" style-hover="background:#1D2120"><span style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6ECC1F,#22DD99);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#05140B">DA</span><i class="ph ph-caret-down" style="font-size:13px;color:#7B7F7B"></i></button>
      </div>
    </header>

    <main style="flex:1;padding:28px 32px 44px;display:flex;flex-direction:column;gap:20px;max-width:1240px;width:100%">
      <div>
        <div style="font:500 11px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B;margin-bottom:8px">Admin · authentication &amp; quality check</div>
        <h1 style="margin:0;font-weight:300;font-size:38px;line-height:1.16;letter-spacing:-0.03em">A&amp;QC<span style="color:#66FF33">.</span></h1>
      </div>

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <sc-for list="{{ chips }}" as="c" hint-placeholder-count="5">
          <button onClick="{{ c.onClick }}" style="display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 15px;border-radius:999px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;cursor:pointer;transition:.15s">{{ c.label }}<span style="font:500 11px 'IBM Plex Mono',monospace;opacity:.75">{{ c.count }}</span></button>
        </sc-for>
      </div>

      <sc-if value="{{ hasCards }}" hint-placeholder-val="{{ true }}">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
          <sc-for list="{{ cards }}" as="c" hint-placeholder-count="6">
            <div style="background:#0F1210;border:1px solid rgba(255,255,255,0.07);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s" style-hover="transform:translateY(-2px);box-shadow:0 16px 40px -16px rgba(0,0,0,0.7)">
              <div style="aspect-ratio:16/10;position:relative;background:radial-gradient(circle at 50% 32%, {{ c.crest }} 0%, #0C0F0D 78%),repeating-linear-gradient(135deg,#0F1210 0 11px,#12160f 11px 22px);display:flex;align-items:center;justify-content:center">
                <span style="font:500 10px 'IBM Plex Mono',monospace;letter-spacing:0.08em;color:#4A4E4B">{{ c.sku }}</span>
                <span style="position:absolute;top:12px;right:12px;display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:999px;font:600 10px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.04em;text-transform:uppercase;background:{{ c.aBg }};color:{{ c.aColor }};border:1px solid {{ c.aBorder }}"><i class="ph ph-clock" style="font-size:12px"></i>{{ c.age }}</span>
              </div>
              <div style="padding:15px;display:flex;flex-direction:column;gap:12px;flex:1">
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="width:34px;height:34px;flex-shrink:0;border-radius:50%;background:#1B1F1D;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;color:#BDBFBD">{{ c.init }}</span>
                  <div style="flex:1;min-width:0"><div style="font:500 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ c.name }}</div><div style="font:400 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">{{ c.client }}</div></div>
                </div>
                <a href="Kickback · F6 AQC inspekcja.dc.html" style="display:inline-flex;align-items:center;justify-content:center;gap:7px;height:38px;border:0;border-radius:999px;font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 10px 24px -8px rgba(34,221,153,0.4);text-decoration:none" style-hover="transform:translateY(-1px)"><i class="ph ph-shield-check" style="font-size:15px"></i>Rozpocznij A&amp;QC</a>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <sc-if value="{{ noCards }}" hint-placeholder-val="{{ false }}">
        <div style="border:1px dashed rgba(255,255,255,0.14);border-radius:18px;padding:80px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;animation:kb-in .2s ease">
          <div style="width:56px;height:56px;border-radius:18px;background:#16191A;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center"><i class="ph ph-coffee" style="font-size:28px;color:#7B7F7B"></i></div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:center"><h3 style="margin:0;font-weight:500;font-size:22px;letter-spacing:-0.015em">Kolejka pusta. Kawa?</h3><p style="margin:0;font:400 14px/1.5 Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#BDBFBD;max-width:44ch">Wszystkie koszulki sprawdzone. Nowe zgłoszenia pojawią się tu po przyjęciu paczek.</p></div>
        </div>
      </sc-if>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
 &quot;pustaKolejka&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Widok&quot;}
}">
class Component extends DCLogic {
  state = { f:'new' };
  renderVals(){
    const cards=[
      {name:'Juventus 2011/12 · L', client:'Marcin K.', sku:'KCB-26-C1D8', d:4, age:'4 dni', f:'new', crest:'#22242A', init:'MK'},
      {name:'Real Madryt away 2016/17 · M', client:'Marcin K.', sku:'KCB-26-C1D8', d:4, age:'4 dni', f:'new', crest:'#3A1D24', init:'MK'},
      {name:'FC Barcelona 2008/09 · S', client:'Anna W.', sku:'KCB-26-H2E441', d:3, age:'3 dni', f:'new', crest:'#1D2A3A', init:'AW'},
      {name:'Polska EURO 2016 · M', client:'Tomek R.', sku:'KCB-26-J8A105', d:2, age:'2 dni', f:'progress', crest:'#2A2410', init:'TR'},
      {name:'AC Milan 2010/11 · M', client:'Anna W.', sku:'KCB-26-K1C773', d:1, age:'1 dzień', f:'progress', crest:'#2A0F14', init:'AW'},
      {name:'Legia Warszawa 2016/17 · L', client:'Paweł B.', sku:'KCB-26-N7F518', d:0, age:'6 h', f:'new', crest:'#0F2A16', init:'PB'},
    ];
    const chipDefs=[
      {k:'new', label:'Nowe', count:'14'},
      {k:'progress', label:'W trakcie', count:'2'},
      {k:'passed', label:'Passed', count:'—'},
      {k:'failed', label:'Failed', count:'—'},
      {k:'review', label:'Do rewizji', count:'2'},
    ];
    const f=this.state.f;
    const forceEmpty=this.props.pustaKolejka ?? false;
    const filtered= forceEmpty?[]: cards.filter(c=> f==='new'?c.f==='new' : f==='progress'?c.f==='progress' : false);
    return {
      chips: chipDefs.map(d=>({ ...d,
        bg: f===d.k?'rgba(102,255,51,0.13)':'#16191A',
        color: f===d.k?'#66FF33':'#BDBFBD',
        border: f===d.k?'rgba(102,255,51,0.4)':'rgba(255,255,255,0.08)',
        onClick:()=>this.setState({f:d.k}) })),
      cards: filtered.map(c=>({ ...c,
        aColor: c.d>3?'#FF5A47':'#FFCC00',
        aBg: c.d>3?'rgba(255,90,71,0.15)':'rgba(255,204,0,0.13)',
        aBorder: c.d>3?'rgba(255,90,71,0.3)':'rgba(255,204,0,0.3)' })),
      hasCards: filtered.length>0, noCards: filtered.length===0,
    };
  }
}
</script>
</body>
</html>
