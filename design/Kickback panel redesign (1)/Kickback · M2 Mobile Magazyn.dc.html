<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#0A0D0B;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="min-height:100vh;background:#0A0D0B;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">
  <div data-screen-label="M2 · Mobile Magazyn 390" style="position:relative;width:390px;height:844px;background:#050807;border:1px solid rgba(255,255,255,0.1);border-radius:32px;overflow:hidden;box-shadow:0 40px 100px -40px rgba(0,0,0,0.9);display:flex;flex-direction:column">

    <header style="flex-shrink:0;display:flex;flex-direction:column;gap:12px;padding:14px 16px;background:rgba(5,8,7,0.9);border-bottom:1px solid rgba(255,255,255,0.07)">
      <div style="display:flex;align-items:center;gap:12px">
        <button style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:11px;background:#16191A;color:#BDBFBD;cursor:pointer"><i class="ph ph-list" style="font-size:19px"></i></button>
        <h1 style="flex:1;margin:0;font-weight:300;font-size:24px;letter-spacing:-0.025em">Magazyn<span style="color:#66FF33">.</span></h1>
        <span style="font:500 11px 'IBM Plex Mono',monospace;color:#4A4E4B">34 szt.</span>
      </div>
      <div style="display:flex;gap:7px;overflow-x:auto;scrollbar-width:none">
        <sc-for list="{{ chips }}" as="c" hint-placeholder-count="4">
          <button onClick="{{ c.onClick }}" style="flex-shrink:0;height:32px;padding:0 13px;border-radius:999px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};font:600 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;cursor:pointer;transition:.15s">{{ c.label }}</button>
        </sc-for>
      </div>
    </header>

    <main style="flex:1;overflow-y:auto;padding:16px 16px 100px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <sc-for list="{{ cards }}" as="r" hint-placeholder-count="6">
          <div style="background:#0F1210;border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden">
            <div style="aspect-ratio:1/1;position:relative;background:radial-gradient(circle at 50% 32%, {{ r.crest }} 0%, #0C0F0D 78%),repeating-linear-gradient(135deg,#0F1210 0 11px,#12160f 11px 22px);display:flex;align-items:center;justify-content:center">
              <span style="font:500 9px 'IBM Plex Mono',monospace;color:#4A4E4B">{{ r.sku }}</span>
              <span style="position:absolute;top:8px;left:8px;display:inline-flex;align-items:center;gap:4px;height:20px;padding:0 8px;border-radius:999px;font:600 8px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.05em;text-transform:uppercase;background:{{ r.sBg }};color:{{ r.sColor }};border:1px solid {{ r.sBorder }}"><span style="width:4px;height:4px;border-radius:9px;background:{{ r.sColor }}"></span>{{ r.status }}</span>
            </div>
            <div style="padding:10px 11px 12px">
              <div style="font:500 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.club }}</div>
              <div style="font:400 10px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B;margin-top:1px">{{ r.meta }}</div>
              <div style="font:600 13px 'IBM Plex Mono',monospace;margin-top:7px">{{ r.price }}</div>
            </div>
          </div>
        </sc-for>
      </div>
    </main>

    <button style="position:absolute;right:16px;bottom:86px;z-index:30;width:56px;height:56px;border:0;border-radius:50%;background:linear-gradient(135deg,#6ECC1F,#22DD99);color:#05140B;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 16px 40px -10px rgba(34,221,153,0.6)"><i class="ph ph-plus" style="font-size:24px"></i></button>

    <nav style="position:absolute;bottom:0;left:0;right:0;z-index:20;height:68px;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(5,8,7,0.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,0.07)">
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-squares-four" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.04em">Przegląd</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-tray" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.04em">Oferty</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#66FF33"><i class="ph ph-package" style="font-size:21px"></i><span style="font:600 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.04em">Magazyn</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-wallet" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.04em">Portfel</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-dots-three-circle" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.04em">Więcej</span></button>
    </nav>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:924}}">
class Component extends DCLogic {
  state = { f:'all' };
  renderVals(){
    const M={
      listed:{label:'Live', c:'#66FF33', bg:'rgba(5,8,7,0.72)', bd:'rgba(102,255,51,0.35)'},
      reserved:{label:'Rezerw.', c:'#7FA0FF', bg:'rgba(5,8,7,0.72)', bd:'rgba(74,107,255,0.4)'},
      held:{label:'Wstrzym.', c:'#FFCC00', bg:'rgba(5,8,7,0.72)', bd:'rgba(255,204,0,0.4)'},
    };
    const all=[
      {club:'Real Madryt', meta:'2011/12 · L · A', price:'2 400 zł', s:'listed', sku:'A9F421', crest:'#3A1D24'},
      {club:'FC Barcelona', meta:'2014/15 · M · A', price:'1 890 zł', s:'reserved', sku:'B7D210', crest:'#1D2A3A'},
      {club:'AC Milan', meta:'2006/07 · S · A', price:'3 200 zł', s:'listed', sku:'E5A144', crest:'#2A0F14'},
      {club:'Polska', meta:'EURO 2016 · M · C', price:'420 zł', s:'held', sku:'F8C202', crest:'#2A2410'},
      {club:'Juventus', meta:'2011/12 · L · B', price:'1 450 zł', s:'listed', sku:'G2B915', crest:'#22242A'},
      {club:'Legia Warszawa', meta:'2019/20 · XL · B', price:'640 zł', s:'listed', sku:'C0D388', crest:'#0F2A16'},
    ];
    const f=this.state.f;
    const chips=[{k:'all',label:'Wszystkie'},{k:'listed',label:'W sprzedaży'},{k:'reserved',label:'Zarezerwowane'},{k:'held',label:'Wstrzymane'}];
    const filtered=all.filter(r=>f==='all'||r.s===f);
    return {
      chips: chips.map(c=>({ ...c,
        bg: f===c.k?'rgba(102,255,51,0.13)':'#16191A',
        color: f===c.k?'#66FF33':'#BDBFBD',
        border: f===c.k?'rgba(102,255,51,0.4)':'rgba(255,255,255,0.08)',
        onClick:()=>this.setState({f:c.k}) })),
      cards: filtered.map(r=>({ ...r, status:M[r.s].label, sColor:M[r.s].c, sBg:M[r.s].bg, sBorder:M[r.s].bd })),
    };
  }
}
</script>
</body>
</html>
