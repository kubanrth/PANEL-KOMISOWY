<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#050807;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div data-screen-label="A2 · Login" style="position:relative;min-height:100vh;background:#050807;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;display:flex;align-items:center;justify-content:center;padding:40px 24px;overflow:hidden">
  <div style="position:absolute;inset:-20% -10% auto auto;width:900px;height:700px;pointer-events:none;background:radial-gradient(circle at 70% 30%, rgba(34,221,153,0.13) 0%, rgba(102,255,51,0.05) 34%, transparent 62%)"></div>
  <div style="position:absolute;inset:auto auto -30% -15%;width:700px;height:600px;pointer-events:none;background:radial-gradient(circle at 30% 70%, rgba(102,255,51,0.07) 0%, transparent 55%)"></div>

  <div style="position:relative;width:480px;max-width:100%;display:flex;flex-direction:column;align-items:center;gap:26px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
      <div style="width:52px;height:52px;border-radius:16px;background:linear-gradient(140deg,#9BFF57 0%,#37D663 45%,#0C9B52 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px -10px rgba(34,221,153,0.55),inset 0 1px 0 rgba(255,255,255,0.35)"><div style="width:0;height:0;border-left:14px solid #05140B;border-top:8px solid transparent;border-bottom:8px solid transparent;margin-left:3px"></div></div>
      <div style="text-align:center"><div style="font-weight:600;font-size:19px;letter-spacing:-0.01em">Kickback</div><div style="font:400 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B;margin-top:2px">komis koszulek piłkarskich</div></div>
    </div>

    <div style="width:100%;background:#0F1210;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:30px;box-shadow:0 40px 100px -40px rgba(0,0,0,0.9);display:flex;flex-direction:column;gap:18px">
      <div><h1 style="margin:0;font-weight:300;font-size:28px;line-height:1.16;letter-spacing:-0.025em">Zaloguj się<span style="color:#66FF33">.</span></h1><p style="margin:6px 0 0;font:400 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">Panel komisanta i status Twoich koszulek.</p></div>

      <sc-if value="{{ classic }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;flex-direction:column;gap:14px">
          <div style="display:flex;flex-direction:column;gap:8px"><label style="font:500 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B">E-mail</label><input defaultValue="marcin.k@gmail.com" style="height:46px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" /></div>
          <div style="display:flex;flex-direction:column;gap:8px"><label style="font:500 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B">Hasło</label><input type="password" defaultValue="••••••••••" style="height:46px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" /></div>
        </div>
      </sc-if>
      <sc-if value="{{ magic }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;flex-direction:column;gap:8px"><label style="font:500 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B">E-mail</label><input placeholder="twoj@email.pl" style="height:46px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" /><span style="font:400 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">Wyślemy jednorazowy link logowania.</span></div>
      </sc-if>

      <button style="display:flex;align-items:center;justify-content:center;gap:8px;height:48px;border:0;border-radius:999px;font:600 15px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 14px 32px -10px rgba(34,221,153,0.5)" style-hover="transform:translateY(-2px)">{{ ctaLabel }}<i class="ph ph-arrow-right" style="font-size:17px"></i></button>

      <div style="display:flex;align-items:center;justify-content:space-between">
        <button style="border:0;background:transparent;font:500 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B;cursor:pointer;padding:0" style-hover="color:#F5F5F3">Nie pamiętam hasła</button>
        <button onClick="{{ toggleMode }}" style="border:0;background:transparent;font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#66FF33;cursor:pointer;padding:0">{{ modeLabel }}</button>
      </div>
    </div>

    <span style="font:400 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">Nie masz konta? <a href="Kickback · A3 Rejestracja.dc.html" style="color:#66FF33;font-weight:600;text-decoration:none">Zarejestruj się</a></span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
 &quot;magicLink&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Stan&quot;}
}">
class Component extends DCLogic {
  state = { magic:null };
  renderVals(){
    const magic = this.state.magic ?? (this.props.magicLink ?? false);
    return {
      magic, classic: !magic,
      ctaLabel: magic ? 'Wyślij magic link' : 'Zaloguj się',
      modeLabel: magic ? 'Wróć do hasła' : 'Zaloguj magic linkiem',
      toggleMode:()=>this.setState({magic:!magic}),
    };
  }
}
</script>
</body>
</html>
