<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#0A0D0B;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="min-height:100vh;background:#0A0D0B;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">
  <div data-screen-label="M5 · Mobile A&QC 390" style="position:relative;width:390px;height:844px;background:#050807;border:1px solid rgba(255,255,255,0.1);border-radius:32px;overflow:hidden;box-shadow:0 40px 100px -40px rgba(0,0,0,0.9);display:flex;flex-direction:column">

    <header style="flex-shrink:0;height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;background:linear-gradient(180deg,rgba(255,90,71,0.05),rgba(5,8,7,0.9));border-bottom:1px solid rgba(255,90,71,0.14)">
      <button style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:11px;background:#16191A;color:#BDBFBD;cursor:pointer"><i class="ph ph-arrow-left" style="font-size:18px"></i></button>
      <div style="flex:1;text-align:center"><div style="font:500 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">A&amp;QC · inspekcja</div><div style="font:400 9px 'IBM Plex Mono',monospace;color:#4A4E4B">KCB-26-C1D8 · poz. 1</div></div>
      <span style="font:600 8px 'IBM Plex Mono',monospace;letter-spacing:0.12em;color:#FF5A47;background:rgba(255,90,71,0.1);border:1px solid rgba(255,90,71,0.25);padding:2px 6px;border-radius:999px;text-transform:uppercase">Admin</span>
    </header>

    <main style="flex:1;overflow-y:auto;padding:16px 16px 130px;display:flex;flex-direction:column;gap:14px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px">
        <div style="aspect-ratio:1/1;border-radius:10px;background:radial-gradient(circle at 50% 32%,#22242A,#0C0F0D);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font:500 8px 'IBM Plex Mono',monospace;color:#4A4E4B">front</div>
        <div style="aspect-ratio:1/1;border-radius:10px;background:radial-gradient(circle at 50% 32%,#22242A,#0C0F0D);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font:500 8px 'IBM Plex Mono',monospace;color:#4A4E4B">tył</div>
        <div style="aspect-ratio:1/1;border-radius:10px;background:radial-gradient(circle at 50% 32%,#22242A,#0C0F0D);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font:500 8px 'IBM Plex Mono',monospace;color:#4A4E4B">crest</div>
        <div style="aspect-ratio:1/1;border-radius:10px;background:radial-gradient(circle at 50% 32%,#22242A,#0C0F0D);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font:500 8px 'IBM Plex Mono',monospace;color:#4A4E4B">metka</div>
      </div>

      <div style="background:#0F1210;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font:500 10px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.07em;text-transform:uppercase;color:#7B7F7B">Checklista</span><span style="font:400 10px 'IBM Plex Mono',monospace;color:#4A4E4B">{{ doneLabel }}</span></div>
        <sc-for list="{{ checks }}" as="c" hint-placeholder-count="6">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid rgba(255,255,255,0.05)">
            <div style="display:flex;align-items:center;gap:10px;min-width:0">
              <sc-if value="{{ c.on }}" hint-placeholder-val="{{ true }}"><span style="width:22px;height:22px;flex-shrink:0;border-radius:8px;background:rgba(102,255,51,0.12);border:1px solid rgba(102,255,51,0.3);display:flex;align-items:center;justify-content:center"><i class="ph ph-check" style="font-size:12px;color:#66FF33"></i></span></sc-if>
              <sc-if value="{{ c.off }}" hint-placeholder-val="{{ false }}"><span style="width:22px;height:22px;flex-shrink:0;border-radius:8px;background:#16191A;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center"><i class="ph ph-minus" style="font-size:11px;color:#4A4E4B"></i></span></sc-if>
              <span style="font:500 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">{{ c.label }}</span>
            </div>
            <button onClick="{{ c.onClick }}" style="width:36px;height:21px;flex-shrink:0;border:0;border-radius:999px;background:{{ c.track }};position:relative;cursor:pointer;transition:background .2s"><span style="position:absolute;top:2px;left:{{ c.knob }};width:17px;height:17px;border-radius:50%;background:#F5F5F3;transition:left .2s"></span></button>
          </div>
        </sc-for>
      </div>

      <div style="background:#0F1210;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px">
        <span style="font:500 10px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.07em;text-transform:uppercase;color:#7B7F7B">Stan</span>
        <div style="display:flex;gap:8px">
          <sc-for list="{{ grades }}" as="g" hint-placeholder-count="3">
            <button onClick="{{ g.onClick }}" style="flex:1;height:40px;border-radius:11px;border:1px solid {{ g.border }};background:{{ g.bg }};color:{{ g.color }};font:600 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;cursor:pointer;transition:.15s">{{ g.k }}</button>
          </sc-for>
        </div>
        <textarea placeholder="Uwagi audytora…" style="min-height:56px;padding:11px 13px;background:#16191A;border:1px solid rgba(255,255,255,0.08);border-radius:12px;font:400 12px/1.5 Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;resize:vertical;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.15)">Drobne przetarcia sitodruku na plecach.</textarea>
      </div>
    </main>

    <div style="position:absolute;bottom:0;left:0;right:0;z-index:20;display:flex;flex-direction:column;gap:9px;padding:14px 16px 20px;background:rgba(5,8,7,0.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,0.07)">
      <button style="display:flex;align-items:center;justify-content:center;gap:8px;height:50px;border:0;border-radius:14px;font:600 15px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 14px 32px -10px rgba(34,221,153,0.5)"><i class="ph ph-check-circle" style="font-size:18px"></i>Pass</button>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
        <button style="display:flex;align-items:center;justify-content:center;gap:7px;height:44px;border:1px solid rgba(255,90,71,0.3);border-radius:12px;font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#FF5A47;background:rgba(255,90,71,0.1);cursor:pointer"><i class="ph ph-x-circle" style="font-size:16px"></i>Fail</button>
        <button style="display:flex;align-items:center;justify-content:center;gap:7px;height:44px;border:1px solid rgba(74,107,255,0.3);border-radius:12px;font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7FA0FF;background:rgba(74,107,255,0.1);cursor:pointer"><i class="ph ph-handshake" style="font-size:16px"></i>Kontra</button>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:924}}">
class Component extends DCLogic {
  state = { checks:{crest:true,patch:true,stitch:true,tag:true,size:true,cond:false}, grade:'B' };
  renderVals(){
    const defs=[{k:'crest',label:'Legit crest'},{k:'patch',label:'Legit patch'},{k:'stitch',label:'Stitching'},{k:'tag',label:'Legit tag'},{k:'size',label:'Rozmiar zgodny'},{k:'cond',label:'Stan potwierdzony'}];
    const s=this.state;
    return {
      checks: defs.map(d=>({ ...d, on:!!s.checks[d.k], off:!s.checks[d.k],
        track: s.checks[d.k]?'#22DD99':'#2A2E2C', knob: s.checks[d.k]?'17px':'2px',
        onClick:()=>this.setState(st=>({checks:{...st.checks,[d.k]:!st.checks[d.k]}})) })),
      doneLabel: defs.filter(d=>s.checks[d.k]).length+' / 6',
      grades: ['A','B','C'].map(k=>({ k,
        bg: s.grade===k?'rgba(102,255,51,0.13)':'#16191A',
        color: s.grade===k?'#66FF33':'#BDBFBD',
        border: s.grade===k?'rgba(102,255,51,0.4)':'rgba(255,255,255,0.08)',
        onClick:()=>this.setState({grade:k}) })),
    };
  }
}
</script>
</body>
</html>
