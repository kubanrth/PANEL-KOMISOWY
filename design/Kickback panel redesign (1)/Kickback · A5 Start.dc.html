<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#050807;-webkit-font-smoothing:antialiased}
@keyframes kb-in{from{transform:translateY(8px)}to{transform:none}}
</style>
</helmet>
<div data-screen-label="A5 · Start (guest)" style="position:relative;min-height:100vh;background:#050807;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;overflow:hidden">
  <div style="position:absolute;inset:-20% -10% auto auto;width:900px;height:700px;pointer-events:none;background:radial-gradient(circle at 70% 30%, rgba(34,221,153,0.11) 0%, transparent 60%)"></div>

  <header style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:22px 32px;max-width:860px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:9px"><div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,#9BFF57,#37D663 45%,#0C9B52);display:flex;align-items:center;justify-content:center"><div style="width:0;height:0;border-left:8px solid #05140B;border-top:5px solid transparent;border-bottom:5px solid transparent;margin-left:2px"></div></div><span style="font-weight:600;font-size:15px">Kickback</span></div>
    <a href="Kickback · A2 Login.dc.html" style="font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#BDBFBD;text-decoration:none" style-hover="color:#F5F5F3">Mam konto →</a>
  </header>

  <main style="position:relative;max-width:720px;margin:0 auto;padding:12px 32px 80px;display:flex;flex-direction:column;gap:16px">
    <div>
      <div style="font:500 11px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B;margin-bottom:8px">Nowa oferta · bez konta</div>
      <h1 style="margin:0;font-weight:300;font-size:36px;line-height:1.16;letter-spacing:-0.03em">Sprzedaj koszulkę. My robimy resztę<span style="color:#66FF33">.</span></h1>
      <p style="margin:10px 0 0;font:400 14px/1.55 Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#BDBFBD;max-width:56ch">Wypełnij trzy sekcje — konto założymy Ci przy potwierdzeniu oferty.</p>
    </div>

    <sc-for list="{{ sections }}" as="s" hint-placeholder-count="4">
      <div style="background:#0F1210;border:1px solid rgba(255,255,255,0.08);border-radius:18px;overflow:hidden">
        <button onClick="{{ s.onToggle }}" style="width:100%;display:flex;align-items:center;gap:13px;padding:16px 20px;border:0;background:transparent;cursor:pointer;text-align:left" style-hover="background:#16191A">
          <span style="width:34px;height:34px;flex-shrink:0;border-radius:10px;background:{{ s.iBg }};border:1px solid {{ s.iBorder }};display:flex;align-items:center;justify-content:center"><i class="ph {{ s.icon }}" style="font-size:17px;color:{{ s.iColor }}"></i></span>
          <span style="flex:1;font:500 15px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:-0.01em;color:#F5F5F3">{{ s.title }}</span>
          <span style="font:400 11px 'IBM Plex Mono',monospace;color:#4A4E4B">{{ s.meta }}</span>
          <i class="ph ph-caret-down" style="font-size:15px;color:#7B7F7B;display:inline-block;transform:{{ s.caretTf }};transition:transform .22s"></i>
        </button>
        <sc-if value="{{ s.open }}" hint-placeholder-val="{{ false }}">
          <div style="padding:4px 20px 20px;animation:kb-in .18s ease">
            <sc-if value="{{ s.isShirt }}" hint-placeholder-val="{{ true }}">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <input placeholder="Klub / reprezentacja" style="height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
                <input placeholder="Sezon · np. 2011/12" style="height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px 'IBM Plex Mono',monospace;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
                <input placeholder="Rozmiar · np. L" style="height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
                <input placeholder="Oczekiwana cena · zł" style="height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px 'IBM Plex Mono',monospace;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
              </div>
            </sc-if>
            <sc-if value="{{ s.isPhotos }}" hint-placeholder-val="{{ false }}">
              <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
                <div style="aspect-ratio:1/1;border-radius:12px;background:radial-gradient(circle at 50% 35%,#22242A,#0C0F0D);border:1px solid rgba(102,255,51,0.35);position:relative;display:flex;align-items:center;justify-content:center"><span style="font:500 9px 'IBM Plex Mono',monospace;color:#7B7F7B">front.jpg</span><span style="position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:#66FF33;display:flex;align-items:center;justify-content:center"><i class="ph ph-check" style="font-size:10px;color:#05140B"></i></span></div>
                <div style="aspect-ratio:1/1;border-radius:12px;background:radial-gradient(circle at 50% 35%,#22242A,#0C0F0D);border:1px solid rgba(102,255,51,0.35);position:relative;display:flex;align-items:center;justify-content:center"><span style="font:500 9px 'IBM Plex Mono',monospace;color:#7B7F7B">tyl.jpg</span><span style="position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:#66FF33;display:flex;align-items:center;justify-content:center"><i class="ph ph-check" style="font-size:10px;color:#05140B"></i></span></div>
                <div style="aspect-ratio:1/1;border-radius:12px;border:1px dashed rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;color:#4A4E4B;cursor:pointer" style-hover="border-color:rgba(102,255,51,0.4)"><i class="ph ph-plus" style="font-size:16px"></i></div>
                <div style="aspect-ratio:1/1;border-radius:12px;border:1px dashed rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;color:#4A4E4B;cursor:pointer" style-hover="border-color:rgba(102,255,51,0.4)"><i class="ph ph-plus" style="font-size:16px"></i></div>
                <div style="aspect-ratio:1/1;border-radius:12px;border:1px dashed rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;color:#4A4E4B;cursor:pointer" style-hover="border-color:rgba(102,255,51,0.4)"><i class="ph ph-plus" style="font-size:16px"></i></div>
                <div style="aspect-ratio:1/1;border-radius:12px;border:1px dashed rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;color:#4A4E4B;cursor:pointer" style-hover="border-color:rgba(102,255,51,0.4)"><i class="ph ph-plus" style="font-size:16px"></i></div>
              </div>
            </sc-if>
            <sc-if value="{{ s.isContact }}" hint-placeholder-val="{{ false }}">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <input placeholder="E-mail" style="height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
                <input placeholder="Telefon" style="height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px 'IBM Plex Mono',monospace;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
              </div>
            </sc-if>
            <sc-if value="{{ s.isAddress }}" hint-placeholder-val="{{ false }}">
              <input placeholder="Ulica, numer, kod, miasto" style="width:100%;height:44px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
            </sc-if>
          </div>
        </sc-if>
      </div>
    </sc-for>

    <a href="Kickback · A7 Potwierdzenie.dc.html" style="display:flex;align-items:center;justify-content:center;gap:8px;height:50px;border:0;border-radius:999px;font:600 15px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 14px 32px -10px rgba(34,221,153,0.5);text-decoration:none" style-hover="transform:translateY(-2px)"><i class="ph ph-paper-plane-tilt" style="font-size:17px"></i>Wyślij ofertę</a>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { open:{shirt:true, photos:true} };
  renderVals(){
    const defs=[
      {id:'shirt', icon:'ph-t-shirt', title:'Koszulka', meta:'klub · sezon · rozmiar · cena', c:'#66FF33'},
      {id:'photos', icon:'ph-camera', title:'Zdjęcia', meta:'2 / 6 dodane', c:'#22DD99'},
      {id:'contact', icon:'ph-user', title:'Kontakt', meta:'e-mail · telefon', c:'#4A6BFF'},
      {id:'address', icon:'ph-map-pin', title:'Adres odbioru', meta:'kurier na nasz koszt', c:'#F5A623'},
    ];
    return {
      sections: defs.map(d=>({ ...d,
        iColor:d.c, iBg:'rgba(255,255,255,0.03)', iBorder:'rgba(255,255,255,0.07)',
        open: !!this.state.open[d.id],
        caretTf: this.state.open[d.id]?'rotate(180deg)':'rotate(0deg)',
        isShirt:d.id==='shirt', isPhotos:d.id==='photos', isContact:d.id==='contact', isAddress:d.id==='address',
        onToggle:()=>this.setState(s=>({open:{...s.open,[d.id]:!s.open[d.id]}})) })),
    };
  }
}
</script>
</body>
</html>
