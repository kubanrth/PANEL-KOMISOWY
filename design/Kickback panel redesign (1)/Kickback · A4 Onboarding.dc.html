<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#050807;-webkit-font-smoothing:antialiased}
@keyframes kb-in{from{transform:translateY(8px)}to{transform:none}}
</style>
</helmet>
<div data-screen-label="A4 · Onboarding" style="position:relative;min-height:100vh;background:#050807;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;display:flex;flex-direction:column;overflow:hidden">
  <div style="position:fixed;top:0;left:0;right:0;height:4px;background:#16191A;z-index:50"><div style="width:{{ progress }};height:100%;background:linear-gradient(90deg,#6ECC1F,#22DD99);box-shadow:0 0 14px 1px rgba(34,221,153,0.5);transition:width .3s"></div></div>
  <div style="position:absolute;inset:-20% -10% auto auto;width:900px;height:700px;pointer-events:none;background:radial-gradient(circle at 70% 30%, rgba(34,221,153,0.1) 0%, transparent 60%)"></div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px 120px">
    <div style="position:relative;width:560px;max-width:100%;display:flex;flex-direction:column;gap:22px">
      <div><div style="font:500 11px 'IBM Plex Mono',monospace;letter-spacing:0.1em;color:#66FF33;margin-bottom:10px">KROK {{ stepNum }} / 4 · {{ stepName }}</div><h1 style="margin:0;font-weight:300;font-size:34px;line-height:1.16;letter-spacing:-0.03em">{{ stepTitle }}<span style="color:#66FF33">.</span></h1></div>

      <sc-if value="{{ isBank }}" hint-placeholder-val="{{ true }}">
        <div style="background:#0F1210;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:26px;display:flex;flex-direction:column;gap:16px;animation:kb-in .18s ease">
          <div style="display:flex;flex-direction:column;gap:8px"><label style="font:500 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B">Numer konta (IBAN)</label><input defaultValue="PL 61 1090 1014 0000 0712 1981 4921" style="height:46px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px 'IBM Plex Mono',monospace;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" /></div>
          <div style="display:flex;flex-direction:column;gap:8px"><label style="font:500 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B">Właściciel konta</label><input defaultValue="Marcin Kowalski" style="height:46px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;outline:none;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" /></div>
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:rgba(34,221,153,0.06);border:1px solid rgba(34,221,153,0.18)"><i class="ph ph-lock-key" style="font-size:17px;color:#22DD99"></i><span style="font:400 12px/1.5 Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#BDBFBD">Na to konto wypłacimy środki ze sprzedaży. Dane szyfrujemy.</span></div>
        </div>
      </sc-if>
      <sc-if value="{{ isOther }}" hint-placeholder-val="{{ false }}">
        <div style="background:#0F1210;border:1px dashed rgba(255,255,255,0.12);border-radius:20px;padding:40px;display:flex;align-items:center;justify-content:center;gap:10px;color:#4A4E4B;animation:kb-in .18s ease"><i class="ph ph-textbox" style="font-size:20px"></i><span style="font:500 12px 'IBM Plex Mono',monospace;letter-spacing:0.06em">formularz kroku „{{ stepName }}" — ten sam wzorzec pól</span></div>
      </sc-if>

      <sc-if value="{{ isType }}" hint-placeholder-val="{{ false }}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;animation:kb-in .18s ease">
          <button onClick="{{ pickB2C }}" style="background:#0F1210;border:1px solid {{ b2cBorder }};border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:12px;cursor:pointer;text-align:left;transition:.15s"><span style="width:42px;height:42px;border-radius:12px;background:rgba(102,255,51,0.1);border:1px solid rgba(102,255,51,0.22);display:flex;align-items:center;justify-content:center"><i class="ph ph-user" style="font-size:21px;color:#66FF33"></i></span><span><span style="display:block;font:500 16px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:-0.015em;color:#F5F5F3">Osoba prywatna</span><span style="display:block;font:400 13px/1.5 Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B;margin-top:4px">Sprzedajesz z własnej kolekcji. Rachunek do wypłaty generujemy my.</span></span></button>
          <button onClick="{{ pickB2B }}" style="background:#0F1210;border:1px solid {{ b2bBorder }};border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:12px;cursor:pointer;text-align:left;transition:.15s"><span style="width:42px;height:42px;border-radius:12px;background:rgba(74,107,255,0.1);border:1px solid rgba(74,107,255,0.22);display:flex;align-items:center;justify-content:center"><i class="ph ph-buildings" style="font-size:21px;color:#4A6BFF"></i></span><span><span style="display:block;font:500 16px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:-0.015em;color:#F5F5F3">Firma B2B</span><span style="display:block;font:400 13px/1.5 Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B;margin-top:4px">Faktury VAT, dedykowane stawki przy wolumenie, opiekun konta.</span></span></button>
        </div>
      </sc-if>
    </div>
  </div>

  <div style="position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 32px;background:rgba(5,8,7,0.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,0.07)">
    <button onClick="{{ back }}" style="display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 20px;border:1px solid rgba(255,255,255,0.09);border-radius:999px;font:600 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;background:#16191A;cursor:pointer;opacity:{{ backOp }}" style-hover="background:#1D2120"><i class="ph ph-arrow-left" style="font-size:16px"></i>Wstecz</button>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="width:22px;height:5px;border-radius:999px;background:{{ d1 }}"></span><span style="width:22px;height:5px;border-radius:999px;background:{{ d2 }}"></span><span style="width:22px;height:5px;border-radius:999px;background:{{ d3 }}"></span><span style="width:22px;height:5px;border-radius:999px;background:{{ d4 }}"></span>
    </div>
    <button onClick="{{ next }}" style="display:inline-flex;align-items:center;gap:8px;height:44px;padding:0 24px;border:0;border-radius:999px;font:600 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 12px 28px -8px rgba(34,221,153,0.5)" style-hover="transform:translateY(-2px)">{{ nextLabel }}<i class="ph ph-arrow-right" style="font-size:16px"></i></button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
 &quot;krok&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;1&quot;,&quot;2&quot;,&quot;3&quot;,&quot;4&quot;],&quot;default&quot;:&quot;3&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Stan&quot;}
}">
class Component extends DCLogic {
  state = { step:null, typ:'b2c' };
  renderVals(){
    const step = this.state.step ?? (parseInt(this.props.krok,10) || 3);
    const names=['Dane osobowe','Adres','Konto bankowe','Typ konta'];
    const titles=['Kim jesteś','Gdzie odbieramy paczki','Gdzie wypłacamy','Jak się rozliczamy'];
    const on='#66FF33', off='#2A2E2C';
    return {
      stepNum:String(step), stepName:names[step-1], stepTitle:titles[step-1],
      progress:(step*25)+'%',
      isBank: step===3, isType: step===4, isOther: step===1||step===2,
      d1:on, d2: step>=2?on:off, d3: step>=3?on:off, d4: step>=4?on:off,
      back:()=>this.setState({step:Math.max(1,step-1)}),
      next:()=>this.setState({step:Math.min(4,step+1)}),
      backOp: step===1?0.4:1,
      nextLabel: step===4?'Zakończ':'Dalej',
      b2cBorder: this.state.typ==='b2c'?'rgba(102,255,51,0.5)':'rgba(255,255,255,0.08)',
      b2bBorder: this.state.typ==='b2b'?'rgba(74,107,255,0.5)':'rgba(255,255,255,0.08)',
      pickB2C:()=>this.setState({typ:'b2c'}),
      pickB2B:()=>this.setState({typ:'b2b'}),
    };
  }
}
</script>
</body>
</html>
