<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#050807;-webkit-font-smoothing:antialiased}
@keyframes kb-in{from{transform:translateY(8px)}to{transform:none}}
</style>
</helmet>
<div data-screen-label="E5 · Zmiany cen" style="display:flex;align-items:stretch;min-height:100vh;background:#050807;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">

  <dc-import name="KickbackSidebar" variant="klient" mode="default" active-id="zmiany" hint-size="260px,1400px" style="flex-shrink:0"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column">
    <header style="position:sticky;top:0;z-index:30;height:64px;flex-shrink:0;display:flex;align-items:center;gap:16px;padding:0 24px;background:rgba(5,8,7,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07)">
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span style="font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">Panel</span><span style="color:#4A4E4B">/</span><span style="font:500 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">Zmiany cen</span></div>
      <div style="flex:1;display:flex;justify-content:center"><div style="width:100%;max-width:400px;height:40px;min-width:0;display:flex;align-items:center;gap:10px;background:#16191A;border-radius:999px;padding:0 16px;border:1px solid rgba(255,255,255,0.06)"><i class="ph ph-magnifying-glass" style="font-size:17px;color:#7B7F7B;flex-shrink:0"></i><span style="flex:1;min-width:0;font:400 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#4A4E4B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Szukaj koszulki, klubu, klienta…</span><span style="flex-shrink:0;font:500 10px 'IBM Plex Mono',monospace;color:#4A4E4B;border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:2px 6px">⌘K</span></div></div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <button style="display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 18px;border:0;border-radius:999px;font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 10px 24px -8px rgba(34,221,153,0.45)" style-hover="transform:translateY(-1px)"><i class="ph ph-plus" style="font-size:15px"></i>Nowa oferta</button>
        <button style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:#16191A;color:#BDBFBD;cursor:pointer" style-hover="background:#1D2120"><i class="ph ph-bell" style="font-size:19px"></i><span style="position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:9px;background:#FFCC00;border:1.5px solid #16191A"></span></button>
        <button style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:#16191A;color:#BDBFBD;cursor:pointer" style-hover="background:#1D2120"><i class="ph ph-moon-stars" style="font-size:19px"></i></button>
        <button style="display:flex;align-items:center;gap:8px;height:40px;padding:0 8px;border:1px solid rgba(255,255,255,0.08);border-radius:999px;background:#16191A;cursor:pointer" style-hover="background:#1D2120"><span style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6ECC1F,#22DD99);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#05140B">MK</span><i class="ph ph-caret-down" style="font-size:13px;color:#7B7F7B"></i></button>
      </div>
    </header>

    <main style="flex:1;padding:28px 32px 44px;display:flex;flex-direction:column;gap:20px;max-width:1000px;width:100%">
      <div>
        <div style="font:500 11px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7B7F7B;margin-bottom:8px">Panel · historia korekt cen</div>
        <h1 style="margin:0;font-weight:300;font-size:38px;line-height:1.16;letter-spacing:-0.03em">Zmiany cen<span style="color:#66FF33">.</span></h1>
      </div>

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <sc-for list="{{ chips }}" as="c" hint-placeholder-count="5">
          <button onClick="{{ c.onClick }}" style="height:34px;padding:0 15px;border-radius:999px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;cursor:pointer;transition:.15s">{{ c.label }}</button>
        </sc-for>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{ rows }}" as="r" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:14px;background:#0F1210;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:14px 16px;transition:background .16s,transform .16s" style-hover="background:#16191A;transform:translateY(-1px)">
            <span style="width:42px;height:42px;flex-shrink:0;border-radius:11px;background:{{ r.aBg }};border:1px solid {{ r.aBorder }};display:flex;align-items:center;justify-content:center"><sc-if value="{{ r.isIcon }}" hint-placeholder-val="{{ false }}"><i class="ph {{ r.icon }}" style="font-size:19px;color:{{ r.aColor }}"></i></sc-if><sc-if value="{{ r.isText }}" hint-placeholder-val="{{ true }}"><span style="font:600 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:{{ r.aColor }}">{{ r.aLabel }}</span></sc-if></span>
            <span style="flex:1;min-width:0">
              <span style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-weight:500;font-size:14px;letter-spacing:-0.01em">{{ r.product }}</span>
                <span style="display:inline-flex;align-items:center;height:19px;padding:0 8px;border-radius:999px;font:600 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.06em;text-transform:uppercase;background:{{ r.wBg }};color:{{ r.wColor }};border:1px solid {{ r.wBorder }}">{{ r.who }}</span>
              </span>
              <span style="display:block;font:400 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B;margin-top:3px">{{ r.reason }}</span>
            </span>
            <span style="display:flex;align-items:center;gap:8px;flex-shrink:0;font:500 14px 'IBM Plex Mono',monospace">
              <span style="color:#7B7F7B">{{ r.from }}</span>
              <i class="ph {{ r.arrow }}" style="font-size:15px;color:{{ r.deltaColor }}"></i>
              <span style="color:{{ r.deltaColor }}">{{ r.to }}</span>
            </span>
            <span style="font:400 11px 'IBM Plex Mono',monospace;color:#4A4E4B;flex-shrink:0;width:64px;text-align:right">{{ r.date }}</span>
          </div>
        </sc-for>
      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { prod:'all' };
  renderVals(){
    const W={
      ty:{label:'Ty', c:'#66FF33', bg:'rgba(102,255,51,0.12)', bd:'rgba(102,255,51,0.28)', aLabel:'MK'},
      kb:{label:'Kickback', c:'#4A6BFF', bg:'rgba(74,107,255,0.12)', bd:'rgba(74,107,255,0.3)', icon:'ph-shield-check'},
      promo:{label:'Promocja', c:'#F5A623', bg:'rgba(245,166,35,0.12)', bd:'rgba(245,166,35,0.3)', icon:'ph-percent'},
    };
    const rows=[
      {prod:'real', product:'Real Madryt 2011/12', w:'promo', from:'2 600 zł', to:'2 400 zł', up:false, reason:'Promocja tygodnia — automatyczna korekta', date:'26 cze'},
      {prod:'real', product:'Real Madryt 2011/12', w:'ty', from:'2 900 zł', to:'2 600 zł', up:false, reason:'Twoja korekta z karty produktu', date:'19 cze'},
      {prod:'milan', product:'AC Milan 2006/07', w:'ty', from:'3 000 zł', to:'3 200 zł', up:true, reason:'Podbicie po wzroście popytu na retro', date:'14 cze'},
      {prod:'juve', product:'Juventus 2011/12', w:'kb', from:'1 600 zł', to:'1 450 zł', up:false, reason:'Dostosowanie do rynku po A&QC', date:'8 cze'},
      {prod:'legia', product:'Legia Warszawa 2016/17', w:'kb', from:'640 zł', to:'520 zł', up:false, reason:'Rotacja >21 dni — rekomendowana obniżka', date:'2 cze'},
    ];
    const chipDefs=[{k:'all',label:'Wszystkie'},{k:'real',label:'Real Madryt'},{k:'milan',label:'AC Milan'},{k:'juve',label:'Juventus'},{k:'legia',label:'Legia'}];
    const s=this.state;
    const filtered=rows.filter(r=>s.prod==='all'||r.prod===s.prod);
    return {
      chips: chipDefs.map(c=>({ ...c,
        bg: s.prod===c.k?'rgba(102,255,51,0.13)':'#16191A',
        color: s.prod===c.k?'#66FF33':'#BDBFBD',
        border: s.prod===c.k?'rgba(102,255,51,0.4)':'rgba(255,255,255,0.08)',
        onClick:()=>this.setState({prod:c.k}) })),
      rows: filtered.map((r,i)=>{
        const w=W[r.w];
        return { key:'r'+i, ...r,
          who:w.label, wColor:w.c, wBg:w.bg, wBorder:w.bd,
          aColor:w.c, aBg:w.bg, aBorder:w.bd,
          isText: r.w==='ty', isIcon: r.w!=='ty', icon:w.icon||'', aLabel:w.aLabel||'',
          arrow: r.up?'ph-arrow-up-right':'ph-arrow-down-right',
          deltaColor: r.up?'#22DD99':'#FF5A47',
        };
      }),
    };
  }
}
</script>
</body>
</html>
