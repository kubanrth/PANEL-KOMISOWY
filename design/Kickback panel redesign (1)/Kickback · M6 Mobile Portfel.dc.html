<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="kickback-fonts.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#0A0D0B;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="min-height:100vh;background:#0A0D0B;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;font-family:Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3">
  <div data-screen-label="M6 · Mobile Portfel 390" style="position:relative;width:390px;height:844px;background:#050807;border:1px solid rgba(255,255,255,0.1);border-radius:32px;overflow:hidden;box-shadow:0 40px 100px -40px rgba(0,0,0,0.9);display:flex;flex-direction:column">

    <header style="flex-shrink:0;height:56px;display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(5,8,7,0.9);border-bottom:1px solid rgba(255,255,255,0.07)">
      <button style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:11px;background:#16191A;color:#BDBFBD;cursor:pointer"><i class="ph ph-list" style="font-size:19px"></i></button>
      <h1 style="flex:1;margin:0;text-align:center;font-weight:300;font-size:20px;letter-spacing:-0.02em">Portfel<span style="color:#66FF33">.</span></h1>
      <span style="width:38px"></span>
    </header>

    <main style="flex:1;overflow-y:auto;padding:20px 16px 90px;display:flex;flex-direction:column;gap:16px">
      <div style="position:relative;overflow:hidden;border-radius:22px;padding:22px;background:linear-gradient(140deg,#134F31 0%,#0C2C1D 54%,#0A1611 100%);border:1px solid rgba(102,255,51,0.18)">
        <div style="display:flex;align-items:center;gap:7px;font:500 10px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#8FE7B4;margin-bottom:12px"><i class="ph ph-wallet" style="font-size:14px"></i>Dostępne do wypłaty</div>
        <div style="font-weight:300;font-size:42px;line-height:1;letter-spacing:-0.035em;margin-bottom:18px">8 240 zł</div>
        <div style="display:flex;gap:9px">
          <button onClick="{{ openSheet }}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;height:46px;border:0;border-radius:999px;font:600 14px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#7CFF3D,#22DD99);box-shadow:0 12px 28px -8px rgba(34,221,153,0.5)"><i class="ph ph-arrow-up-right" style="font-size:16px"></i>Wypłać teraz</button>
          <button style="height:46px;padding:0 16px;border:1px solid rgba(255,255,255,0.16);border-radius:999px;font:600 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#F5F5F3;background:rgba(255,255,255,0.04);cursor:pointer">Historia</button>
        </div>
        <div style="display:flex;gap:22px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1)">
          <div><div style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.06em;text-transform:uppercase;color:#8FE7B4">W rozliczeniu</div><div style="font:500 14px 'IBM Plex Mono',monospace;margin-top:3px">2 340 zł</div></div>
          <div><div style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;letter-spacing:0.06em;text-transform:uppercase;color:#8FE7B4">Wypłacone</div><div style="font:500 14px 'IBM Plex Mono',monospace;margin-top:3px">14 800 zł</div></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:9px">
        <h2 style="margin:0;font-weight:500;font-size:16px;letter-spacing:-0.015em">Transakcje</h2>
        <sc-for list="{{ txs }}" as="t" hint-placeholder-count="4">
          <div style="display:flex;align-items:center;gap:11px;background:#0F1210;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:12px 13px">
            <span style="width:34px;height:34px;flex-shrink:0;border-radius:10px;background:{{ t.iBg }};display:flex;align-items:center;justify-content:center"><i class="ph {{ t.icon }}" style="font-size:16px;color:{{ t.iColor }}"></i></span>
            <div style="flex:1;min-width:0"><div style="font:500 13px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ t.label }}</div><div style="font:400 10px 'IBM Plex Mono',monospace;color:#4A4E4B;margin-top:1px">{{ t.date }}</div></div>
            <span style="font:600 13px 'IBM Plex Mono',monospace;color:{{ t.amtColor }};flex-shrink:0">{{ t.amount }}</span>
          </div>
        </sc-for>
      </div>
    </main>

    <sc-if value="{{ sheet }}" hint-placeholder-val="{{ false }}">
      <div onClick="{{ closeSheet }}" style="position:absolute;inset:0;z-index:40;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;z-index:41;background:#1D2120;border-top:1px solid rgba(255,255,255,0.1);border-radius:24px 24px 0 0;padding:10px 20px 24px;box-shadow:0 -20px 60px -20px rgba(0,0,0,0.8)">
        <div style="width:38px;height:4px;border-radius:999px;background:rgba(255,255,255,0.18);margin:0 auto 16px"></div>
        <h3 style="margin:0 0 4px;font-weight:500;font-size:19px;letter-spacing:-0.02em">Wypłać środki</h3>
        <p style="margin:0 0 16px;font:400 12px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#7B7F7B">Na konto PKO •• 4921 · 1–2 dni robocze · 0 zł</p>
        <input defaultValue="8 240 zł" style="width:100%;height:48px;padding:0 16px;background:#16191A;border:1px solid rgba(255,255,255,0.09);border-radius:14px;font:500 17px 'IBM Plex Mono',monospace;color:#F5F5F3;outline:none;margin-bottom:12px;transition:.15s" style-focus="border-color:#66FF33;box-shadow:0 0 0 3px rgba(102,255,51,0.18)" />
        <button onClick="{{ closeSheet }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;height:50px;border:0;border-radius:999px;font:600 15px Lufga,'Plus Jakarta Sans',system-ui,sans-serif;color:#05140B;cursor:pointer;background:linear-gradient(135deg,#6ECC1F,#22DD99);box-shadow:0 14px 32px -10px rgba(34,221,153,0.5)"><i class="ph ph-check" style="font-size:17px"></i>Wypłać 8 240 zł</button>
      </div>
    </sc-if>

    <nav style="position:absolute;bottom:0;left:0;right:0;z-index:20;height:68px;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(5,8,7,0.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,0.07)">
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-squares-four" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">Przegląd</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-tray" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">Oferty</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-package" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">Magazyn</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#66FF33"><i class="ph ph-wallet" style="font-size:21px"></i><span style="font:600 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">Portfel</span></button>
      <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#7B7F7B"><i class="ph ph-dots-three-circle" style="font-size:21px"></i><span style="font:500 9px Lufga,'Plus Jakarta Sans',system-ui,sans-serif">Więcej</span></button>
    </nav>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:924},
 &quot;otwartySheet&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Stan&quot;}}">
class Component extends DCLogic {
  state = { sheet:false };
  renderVals(){
    const txs=[
      {icon:'ph-hand-coins', iColor:'#22DD99', iBg:'rgba(34,221,153,0.1)', label:'AC Milan 2006/07', date:'28 cze · sprzedaż', amount:'+2 720 zł', amtColor:'#22DD99'},
      {icon:'ph-hand-coins', iColor:'#22DD99', iBg:'rgba(34,221,153,0.1)', label:'Real Madryt 2013/14', date:'19 cze · sprzedaż', amount:'+2 378 zł', amtColor:'#22DD99'},
      {icon:'ph-bank', iColor:'#4A6BFF', iBg:'rgba(74,107,255,0.1)', label:'Wypłata •• 4921', date:'15 cze · wypłata', amount:'−3 000 zł', amtColor:'#FF5A47'},
      {icon:'ph-percent', iColor:'#F5A623', iBg:'rgba(245,166,35,0.1)', label:'Korekta prowizji', date:'2 cze · korekta', amount:'+45 zł', amtColor:'#22DD99'},
    ];
    return {
      txs,
      sheet: this.state.sheet || (this.props.otwartySheet ?? false),
      openSheet:()=>this.setState({sheet:true}),
      closeSheet:()=>this.setState({sheet:false}),
    };
  }
}
</script>
</body>
</html>
